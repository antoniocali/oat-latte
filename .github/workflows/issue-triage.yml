name: Issue Triage

on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write

jobs:
  triage:
    name: Auto-triage new issues
    runs-on: ubuntu-latest

    steps:
      - name: Detect issue type and apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const { title, body = '' } = context.payload.issue;
            const text = `${title} ${body}`.toLowerCase();

            const rules = [
              {
                labels: ['bug'],
                keywords: ['bug', 'crash', 'panic', 'broken', 'error', 'fail', 'regression',
                           'wrong', 'unexpected', 'not working', 'doesn\'t work', 'does not work'],
              },
              {
                labels: ['enhancement'],
                keywords: ['feature', 'enhancement', 'add', 'support', 'new widget',
                           'new component', 'request', 'improve', 'improvement'],
              },
              {
                labels: ['question'],
                keywords: ['how to', 'how do', 'question', 'help', 'clarify',
                           'documentation', 'docs', 'example'],
              },
              {
                labels: ['documentation'],
                keywords: ['document', 'docs', 'readme', 'guide', 'tutorial',
                           'example', 'typo', 'missing docs'],
              },
            ];

            const labelsToApply = new Set();

            for (const rule of rules) {
              if (rule.keywords.some(kw => text.includes(kw))) {
                rule.labels.forEach(l => labelsToApply.add(l));
              }
            }

            // If nothing matched, flag for manual triage
            if (labelsToApply.size === 0) {
              labelsToApply.add('needs-triage');
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: [...labelsToApply],
            });

      - name: Welcome first-time contributors
        uses: actions/github-script@v7
        with:
          script: |
            const creator = context.payload.issue.user.login;

            // Check if this person has opened issues before
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator,
              state: 'all',
              per_page: 2,
            });

            // Only one issue means this is their first one
            if (issues.length <= 1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: `Thanks for opening your first issue, @${creator}! 🎉\n\nA maintainer will review this shortly. In the meantime, feel free to check the [documentation](https://oat-latte.dev) or browse existing issues for related discussions.`,
              });
            }
